name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  client-page-helpers:
    name: client-page-helpers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 20 is Vercel's current runtime for this project. No deps to
      # install; the lint is a single-file pure-Node script with zero imports
      # beyond the stdlib.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run client-page-helper lint
        run: node scripts/lint-client-page-helpers.js

      # If the lint fails, print the protocol so the PR author sees the fix
      # directly in the log instead of having to click away to docs/.
      - name: On failure, print protocol
        if: failure()
        run: |
          echo ''
          echo '--- docs/client-page-helper-protocol.md ---'
          cat docs/client-page-helper-protocol.md
  no-shadowing-deploys:
    name: no-shadowing-deploys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run no-shadowing-deploys lint
        run: node scripts/lint-no-shadowing-deploys.js

  api-cache-vs-auth:
    name: api-cache-vs-auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Catches Vercel-edge-cache vs auth mismatches: any api/*.js that calls
      # pageToken.verify / requireAdmin / etc AND sets a cacheable
      # Cache-Control header on its success path. Vercel's edge does not
      # Vary on Cookie, so `public, s-maxage=3600` on an auth-gated route
      # leaks one user's response to subsequent unauthenticated callers.
      # Found in production on /api/campaign-summary on 2026-04-23.
      - name: Run api-cache-vs-auth lint
        run: node scripts/lint-api-cache-vs-auth.js
