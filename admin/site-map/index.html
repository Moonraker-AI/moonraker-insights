<!DOCTYPE html>
<html lang="en" data-theme="light">
<script>try{var st=localStorage.getItem('moonraker-theme');if(st){document.documentElement.setAttribute('data-theme',st)}}catch(e){}</script>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/assets/logo.png">
<title>Site Map Configurator - Moonraker Admin</title>
<link rel="stylesheet" href="/assets/admin-base.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<script src="/shared/admin-auth.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-body); font-family: Inter, -apple-system, sans-serif; }

  /* Navy header — mirrors client-facing template */
  .navy-header { background: var(--color-navy); padding: 1.1rem 0; position: relative; overflow: hidden; }
  .navy-header::before { content: ''; position: absolute; top: -60%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,212,126,.08) 0%, transparent 70%); pointer-events: none; }
  .navy-inner { max-width: 1400px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .navy-inner img { height: 28px; }
  .navy-meta { text-align: right; }
  .navy-meta .label { color: #E8F5EF; font-weight: 600; font-size: .9rem; font-family: 'Outfit', sans-serif; margin: 0; }
  .navy-meta .sub { font-size: .72rem; color: rgba(232,245,239,.55); margin: .15rem 0 0; }

  .topbar { position: sticky; top: 0; z-index: 100; background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: 0 2rem; height: 52px; display: flex; align-items: center; gap: 1rem; }

  /* Floating theme toggle — matches client-facing template position */
  .theme-toggle {
    position: fixed; top: 1.25rem; right: 1.25rem; z-index: 200;
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 50%; width: 40px; height: 40px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; transition: all .15s;
  }
  .theme-toggle:hover { border-color: var(--color-primary); box-shadow: 0 2px 12px rgba(0,212,126,.15); }
  .topbar-title { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 1rem; color: var(--color-heading); }
  .topbar-meta { font-size: .78rem; color: var(--color-muted); }
  .topbar-right { display: flex; align-items: center; gap: .75rem; margin-left: auto; }

  .content { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 6rem; }
  @media (max-width: 1024px) { .content { padding: 1.25rem; } }

  .header-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 14px; padding: 1.1rem 1.5rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .header-card h1 { font-family: 'Outfit', sans-serif; font-size: 1.25rem; margin: 0; color: var(--color-heading); }
  .header-card .root-url { font-size: .8rem; color: var(--color-muted); margin: .15rem 0 0; }
  .status-chip { display: inline-flex; align-items: center; padding: .25rem .65rem; border-radius: 6px; font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .status-draft { background: rgba(245,158,11,.1); color: var(--color-warning); }
  .status-mvp_locked, .status-fully_locked { background: rgba(59,130,246,.08); color: var(--color-info); }
  .status-launched { background: rgba(0,212,126,.1); color: var(--color-success); }
  .source-tag { font-size: .7rem; font-weight: 500; color: var(--color-muted); background: var(--color-bg); border: 1px solid var(--color-border); padding: .15rem .5rem; border-radius: 6px; }

  .toggle-noise { font-size: .78rem; color: var(--color-muted); display: inline-flex; align-items: center; gap: .4rem; cursor: pointer; user-select: none; }
  .toggle-noise input { cursor: pointer; }

  /* Legend */
  .legend { display: flex; gap: 1rem; flex-wrap: wrap; padding: .75rem 1.25rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 12px; margin-bottom: 1rem; font-size: .72rem; color: var(--color-muted); align-items: center; }
  .legend-item { display: inline-flex; align-items: center; gap: .35rem; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .legend-dot.discovered { background: #9CA3AF; }
  .legend-dot.keep { background: var(--color-success); }
  .legend-dot.update { background: var(--color-info); }
  .legend-dot.remove { background: var(--color-danger); }
  .legend-dot.new { background: #8B5CF6; }
  .legend-dot.drafting { background: var(--color-warning); }

  /* ── Tree view ─────────────────────────────────────────────── */
  .tree-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 1.25rem .25rem;
    overflow-x: auto;
    overflow-y: hidden;
    margin-bottom: 1.25rem;
    min-height: 240px;
    position: relative;
  }
  .tree-stage {
    position: relative;
    min-width: max-content;
  }
  .tree-svg {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }
  .tree {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: auto auto 1fr;
    gap: 0 4rem;
    align-items: center;
    min-height: 200px;
    font-size: .82rem;
  }

  .tree-root {
    grid-column: 1;
    padding: .85rem 1.1rem;
    background: linear-gradient(135deg, rgba(0,212,126,.10), rgba(0,212,126,.02));
    border: 1px solid rgba(0,212,126,.3);
    border-radius: 12px;
    min-width: 170px; max-width: 210px;
    box-shadow: 0 2px 12px rgba(0,212,126,.08);
    word-break: break-word;
    align-self: center;
  }
  .tree-root .domain { font-size: .85rem; color: var(--color-heading); line-height: 1.35; font-weight: 700; font-family: 'Outfit', sans-serif; }
  .tree-root .root-label { font-size: .65rem; color: var(--color-primary); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .25rem; font-weight: 700; }

  .tree-categories {
    grid-column: 2 / 4;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .tree-category {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 4rem;
    align-items: center;
  }

  .cat-node {
    grid-column: 1;
    padding: .65rem .9rem;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 11px;
    min-width: 180px; max-width: 210px;
    cursor: pointer; user-select: none;
    transition: all .15s;
    font-size: .82rem;
    box-shadow: 0 1px 2px rgba(0,0,0,.02);
  }
  .cat-node:hover { border-color: var(--color-primary); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.06); }
  .cat-node .cat-title { font-family: 'Outfit', sans-serif; font-weight: 600; color: var(--color-heading); display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
  .cat-node .cat-target {
    font-size: .68rem; color: var(--color-muted); margin-top: .35rem; line-height: 1.4;
    display: flex; align-items: center; gap: .35rem; flex-wrap: wrap;
  }
  .cat-node .target-pill { background: var(--color-primary-subtle); color: var(--color-primary); padding: .08rem .45rem; border-radius: 4px; font-weight: 600; }
  .cat-node .target-pill.complete { background: rgba(0,212,126,.18); }
  .cat-node .found-text { color: var(--color-muted); font-weight: 500; }

  .page-list {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    gap: .4rem;
  }

  .page-node {
    display: flex; align-items: center; gap: .55rem;
    padding: .5rem .8rem;
    background: var(--color-surface);
    border: 1.5px solid var(--color-border);
    border-radius: 9px;
    cursor: pointer; user-select: none;
    min-width: 220px; max-width: 360px;
    transition: all .12s;
    box-shadow: 0 1px 2px rgba(0,0,0,.02);
    align-self: flex-start;
  }
  .page-node:hover { transform: translateX(3px); box-shadow: 0 3px 10px rgba(0,0,0,.06); }
  .page-node.removed { opacity: .55; text-decoration: line-through; text-decoration-color: var(--color-danger); text-decoration-thickness: 1.5px; }

  /* Per-status border color — entire node outlined to match its status */
  .page-node.st-discovered    { border-color: rgba(156,163,175,.45); }
  .page-node.st-existing_keep { border-color: rgba(0,212,126,.55); background: linear-gradient(90deg, rgba(0,212,126,.05), transparent); }
  .page-node.st-existing_update { border-color: rgba(59,130,246,.5); background: linear-gradient(90deg, rgba(59,130,246,.05), transparent); }
  .page-node.st-existing_remove { border-color: rgba(239,68,68,.45); }
  .page-node.st-new           { border-color: rgba(139,92,246,.55); background: linear-gradient(90deg, rgba(139,92,246,.05), transparent); }
  .page-node.st-drafting      { border-color: rgba(245,158,11,.55); background: linear-gradient(90deg, rgba(245,158,11,.05), transparent); }

  .page-node:hover.st-discovered    { border-color: var(--color-primary); }
  .page-node:hover.st-existing_keep { border-color: var(--color-success); }
  .page-node:hover.st-existing_update { border-color: var(--color-info); }
  .page-node:hover.st-existing_remove { border-color: var(--color-danger); }
  .page-node:hover.st-new           { border-color: #8B5CF6; }
  .page-node:hover.st-drafting      { border-color: var(--color-warning); }

  .page-node .page-label { font-size: .82rem; color: var(--color-heading); flex: 1; word-break: break-word; line-height: 1.3; font-weight: 500; }
  .page-node .status-dot { flex-shrink: 0; width: 9px; height: 9px; border-radius: 50%; }
  .status-dot.st-discovered { background: #9CA3AF; }
  .status-dot.st-existing_keep { background: var(--color-success); }
  .status-dot.st-existing_update { background: var(--color-info); }
  .status-dot.st-existing_remove { background: var(--color-danger); }
  .status-dot.st-new { background: #8B5CF6; }
  .status-dot.st-drafting { background: var(--color-warning); }

  .page-rollup {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem .8rem;
    background: var(--color-bg);
    border: 1px dashed var(--color-border);
    border-radius: 9px;
    cursor: pointer; user-select: none;
    font-size: .78rem; color: var(--color-muted);
    min-width: 220px; max-width: 360px;
    font-style: italic;
  }
  .page-rollup:hover { border-color: var(--color-primary); color: var(--color-heading); }

  .cat-add-inline {
    font-size: .82rem; font-weight: 500;
    color: var(--color-primary);
    background: transparent;
    border: 1.5px dashed rgba(0,212,126,.4);
    padding: .5rem .8rem;
    border-radius: 9px;
    cursor: pointer; font-family: inherit;
    min-width: 220px; max-width: 360px;
    width: max-content;
    text-align: left;
    align-self: flex-start;
    line-height: 1.3;
  }
  .cat-add-inline:hover { background: var(--color-primary-subtle); border-style: solid; }

  .mini-chip { display: inline-flex; align-items: center; font-size: .62rem; padding: .05rem .35rem; border-radius: 3px; margin-left: .35rem; font-weight: 600; vertical-align: middle; }
  .mini-chip.primary { background: rgba(139,92,246,.12); color: #8B5CF6; }
  .mini-chip.complete { background: rgba(0,212,126,.12); color: var(--color-success); }
  .mini-chip.pending { background: rgba(245,158,11,.12); color: var(--color-warning); }

  /* ── Modal (Trello-style detail card) ──────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, .55);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-start; justify-content: center;
    z-index: 1000;
    padding: 4rem 1rem 1rem;
    overflow-y: auto;
  }
  [data-theme="dark"] .modal-backdrop { background: rgba(0, 0, 0, .65); }
  .modal-backdrop.open { display: flex; animation: fadeIn .15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--color-surface);
    border-radius: 16px;
    padding: 0;
    max-width: 600px; width: 100%;
    border: 1px solid var(--color-border);
    box-shadow: 0 24px 60px rgba(0,0,0,.25);
    animation: slideUp .2s ease;
    margin-bottom: 4rem;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-head {
    padding: 1.25rem 1.5rem .75rem;
    border-bottom: 1px solid var(--color-border);
    display: flex; align-items: flex-start; gap: 1rem;
  }
  .modal-head-content { flex: 1; min-width: 0; }
  .modal-eyebrow { font-size: .68rem; color: var(--color-primary); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin-bottom: .35rem; display: flex; align-items: center; gap: .35rem; }
  .modal-title { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--color-heading); margin: 0; word-break: break-word; line-height: 1.3; }
  .modal-title-input {
    font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 600;
    color: var(--color-heading); background: var(--color-bg);
    border: 1px solid var(--color-border); border-radius: 8px;
    padding: .45rem .65rem; width: 100%; box-sizing: border-box;
  }
  .modal-title-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(0,212,126,.1); }
  .modal-close {
    background: transparent; border: none; cursor: pointer;
    font-size: 1.4rem; line-height: 1; color: var(--color-muted);
    padding: .25rem .5rem; border-radius: 6px;
    transition: all .12s;
  }
  .modal-close:hover { background: var(--color-bg); color: var(--color-heading); }

  .modal-body { padding: 1.25rem 1.5rem; }

  .field-group { margin-bottom: 1.1rem; }
  .field-group:last-child { margin-bottom: 0; }
  .field-label {
    font-size: .7rem; font-weight: 600; color: var(--color-heading);
    text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: .4rem; display: block;
  }

  .url-row { display: flex; align-items: center; gap: .5rem; padding: .5rem .75rem; background: var(--color-bg); border-radius: 8px; border: 1px solid var(--color-border); font-size: .78rem; word-break: break-all; }
  .url-row a { color: var(--color-primary); text-decoration: none; flex: 1; min-width: 0; }
  .url-row a:hover { text-decoration: underline; }

  .url-preview { font-family: monospace; font-size: .78rem; color: var(--color-muted); padding: .4rem .65rem; background: var(--color-bg); border-radius: 6px; border: 1px dashed var(--color-border); }
  .url-preview .preview-label { color: var(--color-muted); font-family: Inter, sans-serif; font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; margin-right: .4rem; font-weight: 600; }
  .url-preview .preview-path { color: var(--color-heading); }

  .modal input.form-input, .modal textarea.form-input {
    width: 100%; padding: .6rem .75rem; border: 1px solid var(--color-border);
    border-radius: 8px; font-family: inherit; font-size: .88rem;
    color: var(--color-body); background: var(--color-bg); box-sizing: border-box;
  }
  .modal input.form-input:focus, .modal textarea.form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(0,212,126,.1); }
  .modal textarea.form-input { min-height: 70px; resize: vertical; }
  .field-help { font-size: .7rem; color: var(--color-muted); margin-top: .35rem; line-height: 1.45; }

  .status-pills { display: flex; flex-wrap: wrap; gap: .4rem; }
  .status-pill {
    font-family: inherit; font-size: .75rem; font-weight: 600;
    padding: .4rem .7rem; border-radius: 7px;
    border: 1px solid var(--color-border); background: var(--color-bg);
    color: var(--color-body); cursor: pointer;
    transition: all .12s; display: inline-flex; align-items: center; gap: .35rem;
  }
  .status-pill:hover { border-color: var(--color-primary); }
  .status-pill .pill-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-pill.active.st-discovered { background: rgba(107,117,153,.15); border-color: #9CA3AF; color: var(--color-heading); }
  .status-pill.active.st-existing_keep { background: rgba(0,212,126,.15); border-color: var(--color-success); color: var(--color-heading); }
  .status-pill.active.st-existing_update { background: rgba(59,130,246,.12); border-color: var(--color-info); color: var(--color-heading); }
  .status-pill.active.st-existing_remove { background: rgba(239,68,68,.12); border-color: var(--color-danger); color: var(--color-heading); }
  .status-pill.active.st-new { background: rgba(139,92,246,.12); border-color: #8B5CF6; color: var(--color-heading); }
  .status-pill.active.st-drafting { background: rgba(245,158,11,.12); border-color: var(--color-warning); color: var(--color-heading); }

  .modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--color-border);
    display: flex; justify-content: space-between; gap: .5rem; align-items: center;
    flex-wrap: wrap;
  }
  .modal-footer-left, .modal-footer-right { display: flex; gap: .5rem; }

  .bio-summary { padding: .75rem 1rem; background: var(--color-bg); border-radius: 8px; font-size: .8rem; line-height: 1.6; }
  .bio-summary .b-row { display: flex; justify-content: space-between; gap: .5rem; }
  .bio-summary .b-key { color: var(--color-muted); font-weight: 500; }
  .bio-summary .b-val { color: var(--color-heading); }

  .empty-msg, .loading-msg { text-align: center; padding: 2.5rem 1rem; color: var(--color-muted); font-size: .88rem; }
  .empty-msg h3 { font-family: 'Outfit', sans-serif; font-size: 1rem; color: var(--color-heading); margin: 0 0 .5rem; }

  /* Toast — canonical design-system pattern: top-center, solid fill, white text */
  .toast {
    position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%);
    padding: .65rem 1.25rem; border-radius: 10px;
    font-size: .82rem; font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    max-width: min(520px, 90vw); width: max-content;
    text-align: center; line-height: 1.4;
    z-index: 10000;
  }
  .toast.show { opacity: 1; pointer-events: auto; }
  .toast.ok  { background: var(--color-primary); color: #fff; }
  .toast.err { background: var(--color-danger);  color: #fff; }
</style>
</head>
<body>

<div class="navy-header">
  <div class="navy-inner">
    <a href="/admin"><img src="/assets/logo.png" alt="Moonraker"></a>
    <div class="navy-meta">
      <p class="label">Site Map Configurator</p>
      <p class="sub" id="navy-sub">Loading…</p>
    </div>
  </div>
</div>

<div class="topbar">
  <a id="backLink" href="/admin/clients/" class="btn btn-ghost btn-sm">← Clients</a>
  <div class="topbar-meta" id="tb-meta" style="font-size:.78rem;color:var(--color-muted);"></div>
  <div class="topbar-right">
    <label class="toggle-noise">
      <input type="checkbox" id="showAllToggle"> Show all categories
    </label>
  </div>
</div>

<button class="theme-toggle" id="themeBtn" aria-label="Toggle theme"><span class="theme-icon">&#x1F319;</span></button>

<div class="content" id="content">
  <div class="loading-msg" id="loading">Loading site map…</div>
</div>

<!-- Page detail modal -->
<div class="modal-backdrop" id="page-modal">
  <div class="modal" id="page-modal-content">
    <!-- populated by openPageModal() -->
  </div>
</div>

<!-- Add page modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-content">
        <div class="modal-eyebrow"><span id="add-cat-label">Add page</span></div>
        <h2 class="modal-title" id="add-modal-title">New page</h2>
      </div>
      <button class="modal-close" onclick="closeModal('add-modal')" aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Title (target keyword)</label>
        <input type="text" class="form-input" id="add-title" placeholder="e.g. couples therapy for entrepreneurs" oninput="updateAddPreview()">
        <div class="field-help">Write it like a search query — this becomes the H1 and the SEO target.</div>
      </div>
      <div class="field-group">
        <label class="field-label">URL path</label>
        <div class="url-preview">
          <span class="preview-label">Preview:</span><span class="preview-path" id="add-url-preview">/your-page</span>
        </div>
        <input type="text" class="form-input" id="add-url" placeholder="Override the auto-generated path here (optional)" style="margin-top:.5rem">
        <div class="field-help">By default the URL comes from the title above. Type here to override.</div>
      </div>
      <div class="field-group">
        <label class="field-label">Notes (optional)</label>
        <textarea class="form-input" id="add-notes" placeholder="Secondary keywords, persona, or context"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <div></div>
      <div class="modal-footer-right">
        <button class="btn btn-outline" onclick="closeModal('add-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="submitAdd()">Add page</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  var qp = new URLSearchParams(window.location.search);
  var pathMatch = window.location.pathname.match(/^\/admin\/clients\/([a-z0-9-]+)\/site-map\/?$/);
  var SLUG = pathMatch ? pathMatch[1] : null;
  var SITE_MAP_ID = qp.get('site_map_id');

  var NOISE_CATEGORIES = ['blog_post', 'careers', 'legal_privacy', 'legal_terms', 'legal_other', 'store'];
  var ROLLUP_CATEGORIES = ['blog_post'];

  var CATEGORY_ORDER = [
    'home', 'service', 'location', 'bio', 'faq', 'contact', 'about',

    var e = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) {
        if (k === 'class') e.className = attrs[k];
        else if (k === 'onclick') e.addEventListener('click', attrs[k]);
        else if (k === 'onchange') e.addEventListener('change', attrs[k]);
        else if (k === 'oninput') e.addEventListener('input', attrs[k]);
        else e.setAttribute(k, attrs[k]);
      });
    }
    if (children) {
      (Array.isArray(children) ? children : [children]).forEach(function(c) {
        if (c == null) return;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);

  // Slugify (mirrors server slugifyTitle in api/site-map-action.js)
  function slugify(t) {
    if (!t) return '';
    return String(t).toLowerCase().trim()
      .replace(/[^a-z0-9\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '')
      .slice(0, 80);
  }

  function labelFromPage(p) {
    if (p.title && p.title.trim()) return p.title.trim();
    if (p.bio_material && p.bio_material.therapist_name && p.bio_material.therapist_name !== 'New Therapist') {
      return p.bio_material.therapist_name;
    }
    if (!p.url) return '(untitled)';
    try {
      var u = new URL(p.url);
      var pathname = (u.pathname || '').replace(/\/+$/, '');
      if (!pathname) return 'Home';
      var segs = pathname.split('/').filter(Boolean);
      var last = segs[segs.length - 1] || '';
      last = last.replace(/\.(html|htm|php)$/i, '');
      last = last.replace(/-([a-z0-9]{5,8})$/i, function(m, suf) {
        return /[0-9]/.test(suf) && /[a-z]/i.test(suf) ? '' : m;
      });
      var spaced = last.replace(/[-_]+/g, ' ').trim();
      if (!spaced) return 'Home';
      return spaced.split(/\s+/).map(function(w) {
        if (w.length <= 2) return w.toUpperCase();
        return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
      }).join(' ');
    } catch (_) { return p.url; }
  }

  function domainFromUrl(u) {
    try { return new URL(u).hostname.replace(/^www\./, ''); } catch(_) { return u || ''; }
  }

      .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, status: r.status, body: j }; }); });
  }
  function apiPost(path, body) {
    return fetch(path, {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function(r) { return r.json().then(function(j) { return { ok: r.ok, status: r.status, body: j }; }); });

    apiGet('/api/site-map-get' + q).then(function(r) {

  // ── SVG curved connectors ─────────────────────────────────────────
  function drawConnectors() {
    var svg = document.getElementById('tree-svg');
    if (!svg) return;
    var stage = svg.parentElement;
    if (!stage) return;
    var stageRect = stage.getBoundingClientRect();
    svg.setAttribute('width', stageRect.width);
    svg.setAttribute('height', stageRect.height);
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    // Stroke color — read from CSS so it adapts to theme
    var strokeColor = getComputedStyle(document.documentElement).getPropertyValue('--color-border').trim() || '#E2E8F0';

    function pt(elem) {
      if (!elem) return null;
      var r = elem.getBoundingClientRect();
      return {
        leftX: r.left - stageRect.left,
        rightX: r.right - stageRect.left,
        midY: r.top - stageRect.top + r.height / 2,
        topY: r.top - stageRect.top,
        bottomY: r.bottom - stageRect.top
      };
    }

    function curve(x1, y1, x2, y2) {
      // Cubic bezier: control points pulled horizontally toward midpoint
      var dx = Math.max(20, (x2 - x1) * 0.5);
      var c1x = x1 + dx, c1y = y1;
      var c2x = x2 - dx, c2y = y2;
      var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M ' + x1 + ' ' + y1 +
                             ' C ' + c1x + ' ' + c1y + ', ' +
                                     c2x + ' ' + c2y + ', ' +
                                     x2 + ' ' + y2);
      path.setAttribute('stroke', strokeColor);
      path.setAttribute('stroke-width', '1.75');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      svg.appendChild(path);
    }

    var root = pt(document.getElementById('tree-root'));
    if (!root) return;

    visibleCategories().forEach(function(cat) {
      var catEl = document.getElementById('cat-' + cat);
      if (!catEl) return;
      var c = pt(catEl);
      if (!c) return;
      // Root → category
      curve(root.rightX, root.midY, c.leftX, c.midY);

      // Category → each page (or rollup, or +Add button)
      var listEl = document.querySelector('[data-cat-list="' + cat + '"]');
      if (!listEl) return;
      Array.prototype.forEach.call(listEl.children, function(child) {
        var p = pt(child);
        if (!p) return;
        curve(c.rightX, c.midY, p.leftX, p.midY);
      });
    });
  }
  window.addEventListener('resize', function() { requestAnimationFrame(drawConnectors); });

        el('span', { class: 'b-val' }, bio.has_bio ? 'Complete ✓' : 'Pending — client fills via onboarding step 6')
      ]));
      if (bio.is_primary) summary.appendChild(el('div', { class: 'b-row' }, [el('span', { class: 'b-key' }, 'Role'), el('span', { class: 'b-val' }, '★ Primary bio')]));
      body.appendChild(el('div', { class: 'field-group' }, [
        el('label', { class: 'field-label' }, 'Bio Details'),
        summary
      ]));
    }

    content.appendChild(body);

    // Footer
    var footerLeft = el('div', { class: 'modal-footer-left' });
    if (p.status === 'new') {
      footerLeft.appendChild(el('button', {
        class: 'btn btn-outline btn-sm',
        style: 'color:var(--color-danger);border-color:rgba(239,68,68,.3)',
        onclick: function() { onDeleteClick(p); }
      }, 'Delete'));
    }
    var footer = el('div', { class: 'modal-footer' }, [
      footerLeft,
      el('div', { class: 'modal-footer-right' }, [
        el('button', { class: 'btn btn-outline', onclick: function() { closeModal('page-modal'); } }, 'Close'),
        el('button', { class: 'btn btn-primary', onclick: function() { saveDetailEdits(p); } }, 'Save')
      ])
    ]);
    content.appendChild(footer);

    openModal('page-modal');
  }
  window.openPageModal = openPageModal;

  function changeStatus(pageId, newStatus) {
    var p = state.pageById[pageId];
    if (!p || p.status === newStatus) return;
    var prevStatus = p.status;

    // Optimistic update — repaint immediately
    p.status = newStatus;
    repaintAfterStatusChange(pageId);

    apiPost('/api/site-map-action', {
      action: 'set_page_status',
      site_map_id: state.site_map.id,
      page_id: pageId,
      status: newStatus
    }).then(function(r) {
      if (!r.ok) {
        // Roll back
        p.status = prevStatus;
        repaintAfterStatusChange(pageId);
        showToast(r.body.error || 'Failed to update', 'err');
        return;
      }
      // Success — refresh counts in background (don't block UI)
      load();
    }).catch(function(e) {
      p.status = prevStatus;
      repaintAfterStatusChange(pageId);
      showToast('Network error', 'err');
    });
  }

  // Repaint the affected page node + the open modal pills without a full
  // reload. Counts will sync when load() returns.
  function repaintAfterStatusChange(pageId) {
    var p = state.pageById[pageId];
    if (!p) return;
    // Update tree node classes
    var nodeEl = document.querySelector('.page-node[data-page-id="' + pageId + '"]');
    if (nodeEl) {
      nodeEl.className = 'page-node st-' + p.status + (p.status === 'existing_remove' ? ' removed' : '');
      var dot = nodeEl.querySelector('.status-dot');
      if (dot) dot.className = 'status-dot st-' + p.status;
    }
    // Update active pill in open modal
    if (state.selectedPageId === pageId) {
      document.querySelectorAll('#page-modal-content .status-pill').forEach(function(b) {
        b.classList.remove('active');
      });
      var newActive = document.querySelector('#page-modal-content .status-pill.st-' + p.status);
      if (newActive) newActive.classList.add('active');
      // Update the eyebrow dot too
      var eyebrowDot = document.querySelector('#page-modal-content .modal-eyebrow .status-dot');
      if (eyebrowDot) eyebrowDot.className = 'status-dot st-' + p.status;
    }
    // Reflow connectors since node colors don't change layout, but if removed
    // class toggled it can shift slightly
    requestAnimationFrame(drawConnectors);
  }

  function updateProposedUrlPreview(p) {
    var titleInput = document.getElementById('detail-title-input');
    var urlInput = document.getElementById('detail-url-input');
    var preview = document.getElementById('detail-url-preview');
    if (!titleInput || !urlInput || !preview) return;
    var explicitUrl = (urlInput.value || '').trim();
    var title = (titleInput.value || '').trim();
    var out;
    if (explicitUrl) {
      out = explicitUrl.indexOf('/') === 0 || explicitUrl.indexOf('http') === 0
        ? explicitUrl : '/' + explicitUrl;
    } else {
      var s = slugify(title || labelFromPage(p));
      out = s ? '/' + s : (p.url || '/page');
    }
    preview.textContent = out;
  }

  function saveDetailEdits(p) {
    var title = (document.getElementById('detail-title-input').value || '').trim();
    var notes = (document.getElementById('detail-notes-input').value || '').trim();
    var urlInput = document.getElementById('detail-url-input');
    var newUrl = urlInput ? (urlInput.value || '').trim() : null;
    // Only send url if it differs from the current page url (string compare).
    // Note: the input is path-only when it's a new proposal; if user pasted
    // a full URL we accept that too.
    var urlChanged = (newUrl !== ((p.url && p.url.indexOf('http') === 0) ? '' : (p.url || '')));
    var unchanged = (title === (p.title || '')) && (notes === (p.notes || '')) && !urlChanged;
    if (unchanged) { closeModal('page-modal'); return; }
    if (!title) { showToast('Title required', 'err'); return; }

    var payload = {
      action: 'rename_page',
      site_map_id: state.site_map.id,
      page_id: p.id,
      title: title, notes: notes
    };
    if (urlChanged) {
      // If user left the field blank but title changed, auto-generate from title.
      // Otherwise send what they typed (path-only or full URL).
      payload.url = newUrl || ('/' + slugify(title));
    }
    apiPost('/api/site-map-action', payload).then(function(r) {
      if (!r.ok) { showToast(r.body.error || 'Failed', 'err'); return; }
      showToast('Saved', 'ok');
      closeModal('page-modal');
      load();
    });
  }

  function onDeleteClick(page) {
    if (page.status !== 'new') {
      showToast('Only new pages can be deleted. Use Remove for existing pages.', 'err');
      return;
    }
    if (!confirm('Delete "' + (page.title || page.url || 'this page') + '"? This cannot be undone.')) return;
    apiPost('/api/site-map-action', {
      action: 'delete_page',
      site_map_id: state.site_map.id,
      page_id: page.id
    }).then(function(r) {
      if (!r.ok) { showToast(r.body.error || 'Failed', 'err'); return; }
      showToast('Deleted', 'ok');
      state.selectedPageId = null;
      closeModal('page-modal');
      load();
    });
  }

  // ── Add page modal ────────────────────────────────────────────────
  function openAddModal(cat) {
    state.adding_to_category = cat;
    var ph = ADD_PLACEHOLDER[cat] || { title: 'e.g. new page', url: '/new-page' };
    var titleEl = document.getElementById('add-title');
    var urlEl = document.getElementById('add-url');
    titleEl.value = '';
    titleEl.setAttribute('placeholder', ph.title);
    urlEl.value = '';
    urlEl.setAttribute('placeholder', 'Override the auto-generated path here (optional)');
    document.getElementById('add-notes').value = '';
    document.getElementById('add-cat-label').textContent = 'Add ' + (CATEGORY_LABELS[cat] || cat).toLowerCase();
    document.getElementById('add-modal-title').textContent = 'New ' + (CATEGORY_LABELS[cat] || cat).toLowerCase().replace(/s$/, '');
    document.getElementById('add-url-preview').textContent = ph.url;
    openModal('add-modal');
    setTimeout(function() { titleEl.focus(); }, 100);
  }

  window.updateAddPreview = function() {
    var title = document.getElementById('add-title').value || '';
    var explicitUrl = (document.getElementById('add-url').value || '').trim();
    var preview;
    if (explicitUrl) {
      preview = explicitUrl.indexOf('/') === 0 ? explicitUrl : '/' + explicitUrl;
    } else {
      var s = slugify(title);
      if (s) {
        preview = '/' + s;
      } else {
        var ph = ADD_PLACEHOLDER[state.adding_to_category];
        preview = ph ? ph.url : '/your-page';
      }
    }
    document.getElementById('add-url-preview').textContent = preview;
  };
  // Also re-preview when URL field changes
  document.getElementById('add-url').addEventListener('input', window.updateAddPreview);

  window.submitAdd = function() {
    var cat = state.adding_to_category;
    if (!cat) return;
    var title = document.getElementById('add-title').value.trim();
    var url = document.getElementById('add-url').value.trim();
    var notes = document.getElementById('add-notes').value.trim();
    if (!title) { showToast('Title required', 'err'); return; }
    apiPost('/api/site-map-action', {
      action: 'add_page',
      site_map_id: state.site_map.id,
      category: cat, title: title,
      url: url || null, notes: notes || null
    }).then(function(r) {
      if (!r.ok) { showToast(r.body.error || 'Failed', 'err'); return; }
      closeModal('add-modal');
      showToast('Page added', 'ok');
      load();
    });
  };

  // Click-outside-to-close + ESC on modals
  document.querySelectorAll('.modal-backdrop').forEach(function(b) {
    b.addEventListener('click', function(e) {
      if (e.target === b) closeModal(b.id);
    });
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-backdrop.open').forEach(function(b) { closeModal(b.id); });
    }
  });

  load();
})();
</script>
</body>
</html>
