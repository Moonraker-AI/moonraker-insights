<!DOCTYPE html>
<html lang="en" data-theme="light">
<script>try{var st=localStorage.getItem('moonraker-theme');if(st){document.documentElement.setAttribute('data-theme',st)}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark')}}catch(e){}</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmed - Moonraker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root,[data-theme="light"]{--color-primary:#00D47E;--color-primary-hover:#00b86c;--color-primary-subtle:#DDF8F2;--color-bg:#F7FDFB;--color-surface:#FFFFFF;--color-border:#E2E8F0;--color-heading:#1E2A5E;--color-body:#333F70;--color-muted:#6B7599;--color-navy:#141C3A;--color-success:#00D47E}
[data-theme="dark"]{--color-primary:#00D47E;--color-primary-hover:#00f598;--color-primary-subtle:#0D2E22;--color-bg:#080F0B;--color-surface:#0E1A14;--color-border:#1E3530;--color-heading:#E8F5EF;--color-body:#C8D8D0;--color-muted:#5A7A6E;--color-navy:#0A1630}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--color-body);background:var(--color-bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
::view-transition-old(root),::view-transition-new(root){animation-duration:.25s}
h1{font-family:'Outfit',sans-serif;font-weight:700;color:var(--color-heading)}
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:20px;padding:3rem;text-align:center;max-width:520px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.06)}
.check{width:64px;height:64px;background:var(--color-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;animation:pop .5s cubic-bezier(.175,.885,.32,1.275)}
.check svg{width:32px;height:32px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.card h1{font-size:1.5rem;margin-bottom:.5rem}
.card p{color:var(--color-muted);font-size:.9375rem;margin-bottom:1.5rem;line-height:1.6}
.btn{display:inline-block;background:var(--color-primary);color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;padding:.875rem 2.5rem;border-radius:10px;text-decoration:none;transition:all .25s}
.btn:hover{background:var(--color-primary-hover);color:#fff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,126,.3)}
.redirect-note{font-size:.75rem;color:var(--color-muted);margin-top:1rem}
.logo{margin-bottom:2rem;opacity:.6}
.logo img{height:32px}
.delivery-note{background:var(--color-primary-subtle);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:.875rem;line-height:1.6;color:var(--color-heading);text-align:left}
.delivery-note strong{font-weight:600}
</style>
</head>
<body>

<div class="logo"><a href="https://moonraker.ai"><img src="/assets/logo.png" alt="Moonraker"></a></div>

<div class="card">
  <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
  <h1 id="heading">Payment Confirmed!</h1>
  <p id="message">Processing your payment...</p>
  <div id="deliveryNote" class="delivery-note" style="display:none;"></div>
  <a href="#" id="actionBtn" class="btn" style="display:none;">Continue &#8594;</a>
  <div class="redirect-note" id="redirectNote"></div>
</div>

<script>
(function() {
  var SB_URL = 'https://ofmmwcjhdrhvxxkhcuww.supabase.co';
  var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mbW13Y2poZHJodnh4a2hjdXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjM1NTcsImV4cCI6MjA4OTg5OTU1N30.zMMHW0Fk9ixWjORngyxJTIoPOfx7GFsD4wBV4Foqqms';

  var slug = '';
  var checkoutType = '';
  try {
    slug = localStorage.getItem('moonraker-checkout-slug') || '';
    checkoutType = localStorage.getItem('moonraker-checkout-type') || '';
  } catch(e) {}

  // Fallback: check URL params
  if (!slug) {
    var params = new URLSearchParams(window.location.search);
    slug = params.get('slug') || params.get('client_reference_id') || '';
  }

  function sbPatch(table, filter, body) {
    return fetch(SB_URL + '/rest/v1/' + table + '?' + filter, {
      method: 'PATCH',
      headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(body)
    });
  }

  function sbGet(path) {
    return fetch(SB_URL + '/rest/v1/' + path, {
      headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON }
    }).then(function(r) { return r.json(); });
  }

  if (!slug) {
    document.getElementById('heading').textContent = 'Payment Received';
    document.getElementById('message').textContent = 'Thank you! We could not determine your account automatically. Please contact support@moonraker.ai and we will get you set up.';
    return;
  }

  // Clean up localStorage
  try { localStorage.removeItem('moonraker-checkout-slug'); localStorage.removeItem('moonraker-checkout-type'); } catch(e) {}

  if (checkoutType === 'entity-audit') {
    handleEntityAudit();
  } else {
    handleCoreCheckout();
  }

  // ============================================================
  // CORE CAMPAIGN CHECKOUT
  // ============================================================
  function handleCoreCheckout() {
    document.getElementById('heading').textContent = 'Payment Confirmed!';
    document.getElementById('message').textContent = 'Thank you for choosing Moonraker. We are excited to get started on your campaign. Your onboarding dashboard is ready.';

    var onboardingUrl = '/' + slug + '/onboarding';
    var btn = document.getElementById('actionBtn');
    btn.href = onboardingUrl;
    btn.textContent = 'Start Onboarding \u2192';
    btn.style.display = 'inline-block';

    document.getElementById('redirectNote').innerHTML = 'Redirecting automatically in <span id="countdown">5</span> seconds...';

    // Contact status is flipped server-side by the Stripe webhook on
    // checkout.session.completed (api/stripe-webhook.js). This page is
    // landing-only; client-initiated anon writes would race the webhook
    // and would also require anon UPDATE on contacts, which we do not
    // want as a general policy.

    // Auto-redirect
    var count = 5;
    var timer = setInterval(function() {
      count--;
      var el = document.getElementById('countdown');
      if (el) el.textContent = count;
      if (count <= 0) { clearInterval(timer); window.location.href = onboardingUrl; }
    }, 1000);
  }

  // ============================================================
  // ENTITY AUDIT CHECKOUT
  // ============================================================
  function handleEntityAudit() {
    document.getElementById('heading').textContent = 'Premium Audit Confirmed!';
    document.getElementById('message').textContent = 'Thank you for your purchase. Our team will begin preparing your premium entity audit package right away.';

    var note = document.getElementById('deliveryNote');
    note.style.display = 'block';
    note.innerHTML = '<strong>What happens next:</strong> Within 48-72 hours you will receive your ready-to-deploy schema files and a personalized Loom walkthrough of your findings. We will also reach out to schedule your 30-minute strategy call.';

    var btn = document.getElementById('actionBtn');
    btn.href = '/' + slug + '/entity-audit';
    btn.textContent = 'View Your Scorecard \u2192';
    btn.style.display = 'inline-block';

    // All database work (contacts.audit_tier flip, entity_audits tier upgrade,
    // race-case Loom notification) is handled server-side by the Stripe
    // webhook on checkout.session.completed (api/stripe-webhook.js
    // isEntityAudit branch). The entity_audits row itself is created
    // upstream by api/submit-entity-audit.js when the lead first submits
    // the free scorecard intake. This page is landing-only — it just
    // confirms payment to the user and routes them to their scorecard.
    //
    // Previous client-side sbPatch + direct POST to /rest/v1/entity_audits
    // were silently failing (RLS blocked them + CHECK regex on homepage_url
    // + NOT NULL on client_slug). Removed in this commit.
  }
})();
</script>
</body>
</html>
